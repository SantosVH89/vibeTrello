# Servidor HTTP interno del contenedor frontend.
# Dokploy/Traefik apuntara el dominio publico a este puerto 80.
server {
  listen 80;
  server_name _;

  # Archivos estaticos generados por Vite.
  root /usr/share/nginx/html;
  index index.html;

  # Las llamadas /api se envian al backend Express dentro de la red Docker.
  location /api/ {
    proxy_pass http://backend:4000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # React Router necesita devolver index.html cuando se recarga una ruta interna.
  location / {
    try_files $uri $uri/ /index.html;
  }
}

