# Servidor HTTP interno del contenedor frontend.
# Dokploy/Traefik apuntara el dominio publico a este puerto 80.
server {
  listen 80;
  server_name _;

  # Archivos estaticos generados por Vite.
  root /usr/share/nginx/html;
  index index.html;

  # Si el usuario entra sin la barra final, lo enviamos a la ruta correcta de la app.
  location = /vibeTrello {
    return 301 /vibeTrello/;
  }

  # Las llamadas /vibeTrello/api se envian al backend Express dentro de la red Docker.
  # El prefijo publico se elimina antes de llegar a Express, que sigue trabajando con /api.
  location /vibeTrello/api/ {
    proxy_pass http://backend:4000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # React Router necesita devolver index.html cuando se recarga una ruta interna de /vibeTrello.
  location /vibeTrello/ {
    try_files $uri $uri/ /vibeTrello/index.html;
  }
}
